<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MesseAuto – Pi 1</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f5;color:#18222b;font-family:Arial,sans-serif;overflow:hidden}.screen{width:100vw;height:100vh;padding:24px;display:grid;grid-template-rows:90px 1fr;gap:20px}.top{background:#fff;border-radius:22px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 30px #0001}.brand{font-size:34px;font-weight:900;letter-spacing:2px}.brand span{color:#89939b;font-size:18px}.status{display:flex;gap:12px}.pill{padding:12px 18px;border-radius:999px;background:#dfe5e9;font-weight:800}.pill.on{background:#c9f5d9;color:#08742e}.pill.off{background:#ffd4d8;color:#9c1520}.grid{display:grid;grid-template-columns:360px 1fr 390px;gap:20px;min-height:0}.panel{background:#fff;border-radius:22px;box-shadow:0 8px 30px #0001;overflow:hidden}.head{height:62px;border-bottom:1px solid #e2e7ea;padding:0 22px;display:flex;align-items:center;justify-content:space-between;font-weight:900}.body{padding:20px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:14px}.btn{min-height:104px;border:0;border-radius:18px;background:#e8edf0;font-size:20px;font-weight:900;cursor:pointer}.btn.active{background:#222;color:white}.btn.warn.active{background:#f39b16}.btn.red.active{background:#d82738}.carstage{height:100%;display:grid;place-items:center;position:relative;background:linear-gradient(#f8fafb,#e9eef1)}.car{width:310px;height:610px;border-radius:90px;background:#202b34;position:relative;box-shadow:0 40px 60px #0003}.wind{position:absolute;left:55px;right:55px;top:110px;height:150px;background:#7892a4;border-radius:55px 55px 25px 25px}.lamp{position:absolute;top:35px;width:75px;height:35px;background:#59636a;border-radius:50%}.lamp.on{background:#fff6a7;box-shadow:0 -30px 70px #fff4a8}.l{left:35px}.r{right:35px}.indicator{position:absolute;top:90px;width:30px;height:60px;background:#4b5359}.indicator.on{background:#ff9f0a;box-shadow:0 0 32px #ff9f0a}.under{position:absolute;width:440px;height:120px;background:transparent;border-radius:50%;filter:blur(20px)}.under.on{background:#19c9e9aa}.fan{position:absolute;right:45px;bottom:45px;width:110px;height:110px;border:12px solid #65717a;border-radius:50%;display:grid;place-items:center}.fan:after{content:'✦';font-size:74px}.fan.on:after{animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.metrics{display:grid;gap:14px}.metric{background:#f2f5f7;border-radius:18px;padding:18px}.label{color:#78858f;font-weight:800}.value{font-size:34px;font-weight:900;margin-top:6px}.row{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid #edf0f2}.dot{width:12px;height:12px;border-radius:50%;background:#bbc4ca;display:inline-block;margin-right:9px}.dot.on{background:#28c267;box-shadow:0 0 14px #28c267}.foot{font-size:14px;color:#73808a;margin-top:16px}
</style>
</head>
<body><div class="screen"><header class="top"><div class="brand">MESSEAUTO <span>FAHRZEUGSTEUERUNG</span></div><div class="status"><span id="actor" class="pill">ESP AKTOR</span><span id="sensor" class="pill">ESP SENSOR</span><span id="clock" class="pill"></span></div></header><main class="grid"><section class="panel"><div class="head">FAHRZEUGFUNKTIONEN <small>TOUCH</small></div><div class="body buttons"><button class="btn" data-id="lowBeam">Abblendlicht</button><button class="btn" data-id="highBeam">Fernlicht</button><button class="btn" data-id="underbody">Unterboden</button><button class="btn warn" data-id="leftIndicator">Blinker links</button><button class="btn warn" data-id="rightIndicator">Blinker rechts</button><button class="btn red" data-id="hazard">Warnblinker</button><button class="btn" data-id="fan" style="grid-column:1/3">Lüfter</button><button id="allOff" class="btn red" style="grid-column:1/3">Alles aus</button></div></section><section class="panel"><div class="head">FAHRZEUG <small id="drive">SYSTEM BEREIT</small></div><div class="carstage"><div id="under" class="under"></div><div class="car"><div id="lampL" class="lamp l"></div><div id="lampR" class="lamp r"></div><div class="wind"></div><div id="indL" class="indicator l"></div><div id="indR" class="indicator r"></div></div><div id="fan" class="fan"></div></div></section><aside class="panel"><div class="head">STATUS <small>LIVE</small></div><div class="body"><div class="metrics"><div class="metric"><div class="label">Temperatur</div><div id="temp" class="value">-- °C</div></div><div class="metric"><div class="label">Sitzabstand</div><div id="dist" class="value">-- cm</div></div><div class="metric"><div class="label">Sitzposition</div><div id="seat" class="value">--</div></div></div><div id="outputs"></div><div class="foot">Die Seite liest den echten Zustand von Pi 1 und sendet Bedienbefehle an dessen API.</div></div></aside></main></div>
<script>
const labels={underbody:'Unterboden',lowBeam:'Abblendlicht',highBeam:'Fernlicht',leftIndicator:'Blinker links',rightIndicator:'Blinker rechts',fan:'Lüfter'};let state={};const blink=()=>Math.floor(Date.now()/500)%2===0;function pos(d){return d==null?'--':d<32?'VORNE':d>65?'HINTEN':'MITTE'}async function api(url,opt){const r=await fetch(url,opt);if(!r.ok)throw new Error(await r.text());return r.json()}document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>api('/api/functions/'+b.dataset.id+'/toggle',{method:'POST'}).then(refresh));allOff.onclick=()=>api('/api/all-off',{method:'POST'}).then(refresh);async function refresh(){try{state=await api('/api/state');render()}catch(e){console.error(e)}}function render(){clock.textContent=new Date().toLocaleTimeString('de-DE');const a=state.esp32?.esp32_actor?.connected,s=state.esp32?.esp32_sensor?.connected;actor.className='pill '+(a?'on':'off');actor.textContent='ESP AKTOR '+(a?'VERBUNDEN':'OFFLINE');sensor.className='pill '+(s?'on':'off');sensor.textContent='ESP SENSOR '+(s?'VERBUNDEN':'OFFLINE');document.querySelectorAll('[data-id]').forEach(b=>b.classList.toggle('active',b.dataset.id==='hazard'?!!state.hazard:!!state.outputs?.[b.dataset.id]));const lights=state.outputs?.lowBeam||state.outputs?.highBeam;lampL.classList.toggle('on',lights);lampR.classList.toggle('on',lights);indL.classList.toggle('on',(state.outputs?.leftIndicator||state.hazard)&&blink());indR.classList.toggle('on',(state.outputs?.rightIndicator||state.hazard)&&blink());under.classList.toggle('on',!!state.outputs?.underbody);fan.classList.toggle('on',!!state.outputs?.fan);const t=state.sensors?.temperature_c,d=state.sensors?.seat_distance_cm;temp.textContent=t==null?'FEHLER':Number(t).toFixed(1)+' °C';dist.textContent=d==null?'FEHLER':Math.round(d)+' cm';seat.textContent=pos(d);outputs.innerHTML=Object.entries(labels).map(([id,l])=>`<div class="row"><span><i class="dot ${state.outputs?.[id]?'on':''}"></i>${l}</span><b>${state.outputs?.[id]?'AN':'AUS'}</b></div>`).join('');drive.textContent=Object.values(state.outputs||{}).some(Boolean)||state.hazard?'FAHRZEUG AKTIV':'SYSTEM BEREIT'}setInterval(refresh,500);setInterval(render,120);refresh();
</script></body></html>
