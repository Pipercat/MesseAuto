<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MesseAuto – Pi 2</title><style>
*{box-sizing:border-box}body{margin:0;background:#0d141a;color:#eef5f8;font-family:Arial,sans-serif;overflow:hidden}.screen{width:100vw;height:100vh;padding:24px;display:grid;grid-template-rows:90px 1fr;gap:20px}.top,.panel{background:#151f27;border:1px solid #26333d;border-radius:22px}.top{display:flex;align-items:center;justify-content:space-between;padding:0 28px}.brand{font-size:34px;font-weight:900;letter-spacing:2px}.brand span{font-size:17px;color:#84949f}.pill{padding:12px 18px;border-radius:999px;background:#293741;font-weight:800}.pill.on{background:#123d29;color:#65e59a}.pill.off{background:#4a2026;color:#ff7e89}.grid{display:grid;grid-template-columns:380px 1fr 430px;gap:20px;min-height:0}.panel{overflow:hidden}.head{height:62px;border-bottom:1px solid #26333d;padding:0 22px;display:flex;align-items:center;justify-content:space-between;font-weight:900}.body{padding:20px}.tests{display:grid;gap:14px}.btn{height:78px;border:1px solid #32434f;border-radius:16px;background:#202c35;color:#fff;font-size:20px;font-weight:900;cursor:pointer}.btn:hover{background:#2a3944}.btn.red{background:#4c2228}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:14px}.metric{background:#202c35;border-radius:16px;padding:18px}.label{color:#91a1ac;font-weight:800}.value{font-size:32px;font-weight:900;margin-top:7px}.carstage{height:100%;position:relative;display:grid;place-items:center;background:radial-gradient(circle,#1d2b35,#11191f)}.car{width:260px;height:510px;background:#d7e0e5;border-radius:80px;position:relative}.lamp,.ind{position:absolute}.lamp{top:30px;width:65px;height:28px;background:#66747d;border-radius:50%}.lamp.on{background:#fff7ad;box-shadow:0 -25px 55px #fff4a8}.l{left:30px}.r{right:30px}.ind{top:80px;width:24px;height:50px;background:#5b676f}.ind.on{background:#ff9d00;box-shadow:0 0 25px #ff9d00}.under{position:absolute;width:390px;height:100px;border-radius:50%;filter:blur(18px)}.under.on{background:#15d2ee88}.log{height:310px;overflow:auto;background:#0b1116;border-radius:14px;padding:12px;font-family:monospace;font-size:13px}.log div{padding:6px 0;border-bottom:1px solid #1f2a32}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #26333d}
</style></head><body><div class="screen"><header class="top"><div class="brand">MESSEAUTO <span>TEST & DIAGNOSE</span></div><div><span id="pi1" class="pill">PI 1</span> <span id="clock" class="pill"></span></div></header><main class="grid"><section class="panel"><div class="head">SYSTEMTESTS <small>PI 2</small></div><div class="body tests"><button class="btn" data-test="lights">Lichttest</button><button class="btn" data-test="indicators">Blinkertest</button><button class="btn" data-test="fan">Lüftertest</button><button class="btn" data-test="all">Gesamttest</button><button class="btn red" data-test="all_off">Alles aus</button></div></section><section class="panel"><div class="head">FAHRZEUGZUSTAND <small>LIVE VON PI 1</small></div><div class="carstage"><div id="under" class="under"></div><div class="car"><div id="lampL" class="lamp l"></div><div id="lampR" class="lamp r"></div><div id="indL" class="ind l"></div><div id="indR" class="ind r"></div></div></div></section><aside style="display:grid;grid-template-rows:auto 1fr;gap:20px;min-height:0"><section class="panel"><div class="head">TELEMETRIE <small>SQLITE</small></div><div class="body"><div class="metrics"><div class="metric"><div class="label">Datensätze</div><div id="records" class="value">0</div></div><div class="metric"><div class="label">Polling</div><div id="poll" class="value">-- s</div></div><div class="metric"><div class="label">Temperatur</div><div id="temp" class="value">--</div></div><div class="metric"><div class="label">Sitzabstand</div><div id="dist" class="value">--</div></div></div></div></section><section class="panel"><div class="head">SYSTEMPROTOKOLL <small>LIVE</small></div><div class="body"><div id="stateRows"></div><div id="log" class="log"></div></div></section></aside></main></div><script>
let latest={},events=[];const phase=()=>Math.floor(Date.now()/500)%2===0;async function get(url,opt){const r=await fetch(url,opt);if(!r.ok)throw Error(await r.text());return r.json()}function add(text){events.unshift(new Date().toLocaleTimeString('de-DE')+'  '+text);events=events.slice(0,30);log.innerHTML=events.map(x=>'<div>'+x+'</div>').join('')}document.querySelectorAll('[data-test]').forEach(b=>b.onclick=async()=>{b.disabled=true;try{await get('/api/tests/'+b.dataset.test,{method:'POST'});add('Test gestartet: '+b.dataset.test)}catch(e){add('FEHLER: '+e.message)}finally{b.disabled=false}});async function refresh(){clock.textContent=new Date().toLocaleTimeString('de-DE');try{const [s,st]=await Promise.all([get('/api/state'),get('/api/stats')]);latest=s;pi1.className='pill '+(s.connected?'on':'off');pi1.textContent='PI 1 '+(s.connected?'VERBUNDEN':'OFFLINE');records.textContent=st.records||0;poll.textContent=Number(s.poll_seconds).toFixed(1)+' s';const v=s.state||{},o=v.outputs||{},sen=v.sensors||{};temp.textContent=sen.temperature_c==null?'FEHLER':Number(sen.temperature_c).toFixed(1)+' °C';dist.textContent=sen.seat_distance_cm==null?'FEHLER':Math.round(sen.seat_distance_cm)+' cm';const lights=o.lowBeam||o.highBeam;lampL.classList.toggle('on',lights);lampR.classList.toggle('on',lights);indL.classList.toggle('on',(o.leftIndicator||v.hazard)&&phase());indR.classList.toggle('on',(o.rightIndicator||v.hazard)&&phase());under.classList.toggle('on',!!o.underbody);stateRows.innerHTML=`<div class="row"><span>ESP Aktor</span><b>${v.esp32?.esp32_actor?.connected?'ONLINE':'OFFLINE'}</b></div><div class="row"><span>ESP Sensor</span><b>${v.esp32?.esp32_sensor?.connected?'ONLINE':'OFFLINE'}</b></div><div class="row"><span>Letztes Update</span><b>${s.last_success?new Date(s.last_success*1000).toLocaleTimeString('de-DE'):'--'}</b></div>`}catch(e){pi1.className='pill off';pi1.textContent='PI 1 OFFLINE'}}setInterval(refresh,500);refresh();
</script></body></html>
