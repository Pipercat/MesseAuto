<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MesseAuto – Pi 1</title><link rel="stylesheet" href="shared/style.css"></head><body><div class="screen"><header class="topbar"><div class="brand"><div class="brand-mark">M</div><div>MESSEAUTO <span class="subtle">FAHRZEUGSTEUERUNG</span></div></div><div class="status-row"><span id="espActor" class="pill">ESP AKTOR</span><span id="espSensor" class="pill">ESP SENSOR</span><span id="clock" class="pill"></span></div></header><main class="content" style="grid-template-columns:330px 1fr 360px"><section class="panel"><div class="panel-head"><span>FAHRZEUGFUNKTIONEN</span><span class="small">TOUCH</span></div><div class="panel-body" style="display:grid;grid-template-columns:1fr 1fr;gap:13px;align-content:start"><button class="touch-btn blue" data-out="lowBeam">Abblendlicht</button><button class="touch-btn blue" data-out="highBeam">Fernlicht</button><button class="touch-btn" data-out="underbody">Unterboden</button><button class="touch-btn warn" data-out="leftIndicator">Blinker links</button><button class="touch-btn warn" data-out="rightIndicator">Blinker rechts</button><button class="touch-btn danger" data-out="hazard">Warnblinker</button><button class="touch-btn" data-out="fan" style="grid-column:1/3">Lüfter</button></div></section><section class="panel"><div class="panel-head"><span>FAHRZEUG</span><span id="driveState" class="small">SYSTEM BEREIT</span></div><div class="panel-body"><div class="car-stage"><div id="underbodyGlow" class="underbody"></div><div class="car"><div id="lampL" class="headlamp left"></div><div id="lampR" class="headlamp right"></div><div id="indicatorL" class="indicator left"></div><div id="indicatorR" class="indicator right"></div><div class="windshield"></div><div class="rearwindow"></div></div><div id="fan" class="fan"></div></div></div></section><aside style="display:grid;grid-template-rows:1fr 1fr;gap:20px;min-height:0"><section class="panel"><div class="panel-head"><span>SENSOREN</span><span class="small">LIVE</span></div><div class="panel-body"><div class="metric-grid" style="grid-template-columns:1fr"><div class="metric"><div class="metric-label">Temperatur</div><div id="temperature" class="metric-value">-- °C</div></div><div class="metric"><div class="metric-label">Sitzabstand</div><div id="distance" class="metric-value">-- cm</div></div><div class="metric"><div class="metric-label">Sitzposition</div><div id="seat" class="metric-value">--</div></div></div></div></section><section class="panel"><div class="panel-head"><span>SYSTEMSTATUS</span><span class="small">PI 1</span></div><div class="panel-body"><div id="outputs"></div><div style="height:14px"></div><div class="footer-note">GPIO-Ausgänge werden wie im echten System als kurze Impulse simuliert.</div></div></section></aside></main></div><script src="shared/simulation.js"></script><script>const labels={underbody:'Unterboden',lowBeam:'Abblendlicht',highBeam:'Fernlicht',leftIndicator:'Blinker links',rightIndicator:'Blinker rechts',hazard:'Warnblinker',fan:'Lüfter'};document.querySelectorAll('[data-out]').forEach(b=>b.onclick=()=>MesseAutoSim.toggleOutput(b.dataset.out,'PI1 TOUCH'));function render(s,blink){clock.textContent=new Date().toLocaleTimeString('de-DE');espActor.className='pill '+(s.connections.espActor?'on':'off');espActor.textContent='ESP AKTOR '+(s.connections.espActor?'VERBUNDEN':'OFFLINE');espSensor.className='pill '+(s.connections.espSensor?'on':'off');espSensor.textContent='ESP SENSOR '+(s.connections.espSensor?'VERBUNDEN':'OFFLINE');document.querySelectorAll('[data-out]').forEach(b=>b.classList.toggle('active',!!s.outputs[b.dataset.out]));const lights=s.outputs.lowBeam||s.outputs.highBeam;lampL.classList.toggle('on',lights);lampR.classList.toggle('on',lights);const left=(s.outputs.leftIndicator||s.outputs.hazard)&&blink;const right=(s.outputs.rightIndicator||s.outputs.hazard)&&blink;indicatorL.classList.toggle('on',left);indicatorR.classList.toggle('on',right);underbodyGlow.classList.toggle('on',s.outputs.underbody);fan.classList.toggle('on',s.outputs.fan);temperature.textContent=s.sensors.sensorError?'FEHLER':`${Number(s.sensors.temperature).toFixed(1)} °C`;distance.textContent=s.sensors.sensorError?'FEHLER':`${Math.round(s.sensors.seatDistance)} cm`;seat.textContent=s.sensors.sensorError?'--':MesseAutoSim.seatPosition(s.sensors.seatDistance);outputs.innerHTML=Object.entries(labels).map(([id,l])=>`<div class="split" style="padding:9px 0;border-bottom:1px solid #edf1f3"><span><i class="light-dot ${s.outputs[id]?'on':''}"></i>${l}</span><strong>${s.outputs[id]?'AN':'AUS'}</strong></div>`).join('');driveState.textContent=Object.values(s.outputs).some(Boolean)?'FAHRZEUG AKTIV':'SYSTEM BEREIT'}MesseAutoSim.subscribe(render);setInterval(()=>render(MesseAutoSim.load(),Math.floor(Date.now()/500)%2===0),1000)</script></body></html>
