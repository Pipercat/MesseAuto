<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MesseAuto – Pi 2</title><link rel="stylesheet" href="shared/style.css"></head><body><div class="screen"><header class="topbar"><div class="brand"><div class="brand-mark">M</div><div>MESSEAUTO <span class="subtle">TEST & DIAGNOSE</span></div></div><div class="status-row"><span id="pi1" class="pill">PI 1</span><span id="collector" class="pill on">COLLECTOR AKTIV</span><span id="clock" class="pill"></span></div></header><main class="content" style="grid-template-columns:350px 1fr 390px"><section class="panel"><div class="panel-head"><span>SYSTEMTESTS</span><span class="small">PI 2</span></div><div class="panel-body" style="display:grid;gap:12px;align-content:start"><button class="touch-btn" onclick="runTest('light')">Lichttest</button><button class="touch-btn" onclick="runTest('indicator')">Blinkertest</button><button class="touch-btn" onclick="runTest('fan')">Lüftertest</button><button class="touch-btn" onclick="runTest('sensors')">Sensortest</button><button class="touch-btn blue" onclick="runTest('all')">Gesamttest Fahrzeug</button><button class="touch-btn danger" onclick="allOff()">Alles ausschalten</button><div class="metric" style="margin-top:4px"><div class="metric-label">Letzter Test</div><div id="testResult" style="font-size:20px;font-weight:900;margin-top:8px">Noch kein Test</div></div></div></section><section class="panel"><div class="panel-head"><span>LIVE-FAHRZEUGSTATUS</span><span id="activeCount" class="small">0 AKTIV</span></div><div class="panel-body"><div class="car-stage"><div id="underbodyGlow" class="underbody"></div><div class="car"><div id="lampL" class="headlamp left"></div><div id="lampR" class="headlamp right"></div><div id="indicatorL" class="indicator left"></div><div id="indicatorR" class="indicator right"></div><div class="windshield"></div><div class="rearwindow"></div></div><div id="fan" class="fan"></div><div style="position:absolute;left:22px;top:22px;display:grid;gap:10px"><span id="actorBadge" class="pill">ESP AKTOR</span><span id="sensorBadge" class="pill">ESP SENSOR</span></div></div></div></section><aside style="display:grid;grid-template-rows:330px 1fr;gap:20px;min-height:0"><section class="panel"><div class="panel-head"><span>TELEMETRIE</span><span class="small">SQLITE</span></div><div class="panel-body"><div class="metric-grid" style="grid-template-columns:1fr 1fr"><div class="metric"><div class="metric-label">Datensätze</div><div id="records" class="metric-value">0</div></div><div class="metric"><div class="metric-label">Polling</div><div class="metric-value">1 s</div></div><div class="metric"><div class="metric-label">Temperatur</div><div id="temperature" class="metric-value">--</div></div><div class="metric"><div class="metric-label">Sitz</div><div id="seat" class="metric-value">--</div></div></div><div id="lastUpdate" class="footer-note" style="margin-top:15px">Noch keine Daten</div></div></section><section class="panel"><div class="panel-head"><span>SYSTEMPROTOKOLL</span><span class="small">LIVE</span></div><div id="logs" class="panel-body log"></div></section></aside></main></div><script src="shared/simulation.js"></script><script>let testTimer=null;const sleep=ms=>new Promise(r=>setTimeout(r,ms));async function runTest(type){if(testTimer)return;testResult.textContent='Test läuft …';testResult.style.color='#2679ba';testTimer=true;const pulse=async(id,ms=900)=>{MesseAutoSim.setOutput(id,true,'PI2 TEST');await sleep(ms);MesseAutoSim.setOutput(id,false,'PI2 TEST')};if(type==='light'){await pulse('lowBeam');await pulse('highBeam');await pulse('underbody')}if(type==='indicator'){await pulse('leftIndicator',1400);await pulse('rightIndicator',1400);await pulse('hazard',1400)}if(type==='fan'){await pulse('fan',1800)}if(type==='sensors'){const s=MesseAutoSim.load();testResult.textContent=s.sensors.sensorError?'Sensorfehler erkannt':'Sensoren in Ordnung';testResult.style.color=s.sensors.sensorError?'#c33':'#198754';testTimer=null;return}if(type==='all'){for(const id of ['lowBeam','highBeam','underbody','leftIndicator','rightIndicator','hazard','fan'])await pulse(id,700)}testResult.textContent='Test erfolgreich';testResult.style.color='#198754';testTimer=null}function allOff(){['underbody','lowBeam','highBeam','leftIndicator','rightIndicator','hazard','fan'].forEach(id=>MesseAutoSim.setOutput(id,false,'PI2 NOT-AUS'));testResult.textContent='Alle Ausgänge AUS';testResult.style.color='#c33'}function render(s,blink){clock.textContent=new Date().toLocaleTimeString('de-DE');pi1.className='pill '+(s.connections.pi1?'on':'off');pi1.textContent='PI 1 '+(s.connections.pi1?'ERREICHBAR':'OFFLINE');actorBadge.className='pill '+(s.connections.espActor?'on':'off');actorBadge.textContent='ESP AKTOR '+(s.connections.espActor?'ONLINE':'OFFLINE');sensorBadge.className='pill '+(s.connections.espSensor?'on':'off');sensorBadge.textContent='ESP SENSOR '+(s.connections.espSensor?'ONLINE':'OFFLINE');const lights=s.outputs.lowBeam||s.outputs.highBeam;lampL.classList.toggle('on',lights);lampR.classList.toggle('on',lights);indicatorL.classList.toggle('on',(s.outputs.leftIndicator||s.outputs.hazard)&&blink);indicatorR.classList.toggle('on',(s.outputs.rightIndicator||s.outputs.hazard)&&blink);underbodyGlow.classList.toggle('on',s.outputs.underbody);fan.classList.toggle('on',s.outputs.fan);activeCount.textContent=`${Object.values(s.outputs).filter(Boolean).length} AKTIV`;records.textContent=s.telemetry.records;temperature.textContent=s.sensors.sensorError?'ERR':`${Number(s.sensors.temperature).toFixed(1)}°`;seat.textContent=s.sensors.sensorError?'--':MesseAutoSim.seatPosition(s.sensors.seatDistance);lastUpdate.textContent=s.telemetry.lastUpdate?`Letztes Update: ${new Date(s.telemetry.lastUpdate).toLocaleTimeString('de-DE')}`:'Noch keine Daten';logs.innerHTML=s.logs.slice(0,14).map(l=>`<div class="log-row"><span class="small">${l.time}</span> <span class="log-source">[${l.source}]</span> ${l.text}</div>`).join('')}MesseAutoSim.subscribe(render);setInterval(MesseAutoSim.tickTelemetry,1000);setInterval(()=>render(MesseAutoSim.load(),Math.floor(Date.now()/500)%2===0),1000)</script></body></html>
